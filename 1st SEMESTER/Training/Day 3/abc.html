<!DOCTYPE html>
<html>
  <head>
    <title>Document</title>
  </head>
  <body>
    <!-- A&nbsp;B&nbsp;C&nbsp; <br> -->
    <!-- A&emsp;B&emsp;C&emsp; -->
    <!-- comment -->
    <h1>List of fruits</h1>
    <ol type="I">
      <li>Apple</li>
      <li>Banana</li>
      <li>orange</li>
      <li>Grapes</li>
      <li>Guava</li>
    </ol>

    <h1>List of fruits</h1>
    <ul type="square">
      <li>Apple</li>
      <li>Banana</li>
      <li>orange</li>
      <li>Grapes</li>
      <li>Guava</li>
    </ul>
    <dl>
      <dt>Apple</dt>
      <dd>Banana</dd>
      <dt>Mango</dt>
      <dd>Orange</dd>
    </dl>
    <marquee behavior="scroll" direction="" scrollamount="20">This is marquee</marquee>
    <marquee behavior="scroll" direction="right" scrollamount="20">This is marquee</marquee>
    <marquee behavior="alternate" direction="right" scrollamount="20">This is marquee</marquee>
    <marquee behavior="slide" direction="upward" scrollamount="20">This is a marquee</marquee>
  </body>
</html>
