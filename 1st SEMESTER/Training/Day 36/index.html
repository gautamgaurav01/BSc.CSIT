<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tailwind CSS</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  </head>
  <body class="flex flex-col gap-10 justify-center items-center">
    <p
      class="bg-white text-3xl text-black flex justify-center items-center h-50 w-50 float-left rounded-full border-black border-r-40"
    >
      moon
    </p>
    <div
      class="w-100 h-100 border-t-200 border-l-red-400 bg-green-500 border-r-200 border-t-blue-400 border-l-200 border-r-purple-600 border-b-200 border-b-sky-300"
    ></div>
    <div
      class="w-100 h-100 border-t-5 border-t-red-400 bg-yellow-500 border-r-8 border-r-blue-400 border-l-10 border-b-11 border-b-sky-300"
    ></div>
    <div
      class="w-100 h-100 border-t-200 border-l-red-400 bg-green-500 border-r-200 border-t-blue-400 border-l-200 border-r-purple-600 border-b-200 border-b-sky-300 rounded-full"
    ></div>
    <div
      class="w-100 h-100 rounded-full bg-red-700 flex justify-center items-center hover:rotate-45"
    >
      <div class="w-50 h-50 bg-blue-600"></div>
    </div>
  </body>
</html>
