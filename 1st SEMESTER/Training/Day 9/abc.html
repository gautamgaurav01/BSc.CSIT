<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <p style="color: rgb(0, 255, 8)">It is line in css.</p>
    <p style="background-color: aqua">It is a background-color</p>
    <p style="color: rgb(197, 196, 255)">it is css</p>
    <p
      style="
        font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
      "
    >
      hello
    </p>
    <p style="text-decoration: underline">Underline</p>
    <p style="font-size: 100px">Hello</p>
    <p style="font-size: 50px">Bye</p>
    <p style="font-size: xx-large">xx large</p>
    <p style="font-size: x-large">x large</p>
    <p style="font-size: larger">Larger</p>
    <p style="font-size: large">Larger</p>
    <p style="font-size: medium">Medium</p>
    <p style="font-size: small">small</p>
    <p style="font-size: smaller">smaller</p>
    <p style="font-size: x-small">X small</p>
    <p style="font-size: xx-small">xx small</p>
    <p style="font-weight: 200">Bold</p>
    <p style="text-transform: capitalize">Capital</p>
    <p style="text-transform: lowercase;">Lowercase</p>
    <p style="text-transform: uppercase;">uppercase</p>
  </body>
</html>
