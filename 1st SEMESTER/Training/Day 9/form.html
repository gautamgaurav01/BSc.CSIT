<!DOCTYPE html>
<html>
  <head>
    <title>Loan Information</title>
    <style>
      .oo {
        background-color: blue;
      }
      .aa {
        color: rgb(21, 255, 0);
      }
      .aa:hover {
        color: red;
      }
      .all {
        background-color: aquamarine;
      }
      .ApplicantInformation {
        background-color: blueviolet;
      }
      .LoanInformation {
        background-color: rgb(255, 159, 127);
      }
      input {
        mix-blend-mode: color-burn;
      }
    </style>
  </head>
  <body>
    <div class="all">
      <form
        action="https://www.indeed.com/q-usa-vacancy-jobs.html?&aceid=&gad_source=1&gclid=EAIaIQobChMI7_2gurv0iQMVi8o8Ah2AWD2NEAAYASAAEgK-fPD_BwE&gclsrc=aw.ds"
      >
        <div class="aa">
          <center><h1>Loan Information</h1></center>
        </div>
        <br />
        <div class="ApplicantInformation">
          <div class="oo">
            <center><h2>Applicant Information</h2></center>
          </div>
          <br />
          <div class="Name">
            <label for="First Name">First Name:</label>
            <input type="First Name" id="First Name " required />
          </div>
          <br />
          <div class="Name">
            <label for="Last Name">Last Name:</label>
            <input type="Last Name" id="Last Name" required />
          </div>
          <br />
          <div class="Email">
            <label for="Email">Email:</label>
            <input type="Email" id="Email" required />
          </div>
          <br />
          <div class="Social">
            <label for="Social Security">Social Security #:</label>
            <input type="Social Security" id="Social Security" required />
          </div>
          <br />
          <div class="Phone">
            <label for="Daytime phone">Daytime phone:</label>
            <input type="Daytime phone" id="Daytime phone" required />
          </div>
          <br />
          <div class="Phone">
            <label for="Evening phone">Evening phone:</label>
            <input type="Evening phone" id="Evening phone" required />
          </div>
          <br />
        </div>
        <div class="LoanInformation">
          <div class="oo">
            <center><h2>Loan Information</h2></center>
          </div>
          <br />
          <div class="loan">
            <label for="Loan Type" style="color: rgba(239, 13, 81, 0.826)"
              >Loan Type:</label
            >
            <select name="Loan Type" id="">
              <option value="Loan Type">Automobile</option>
              <option value="Loan Type">Business</option>
              <option value="Loan Type">Farming</option>
              <option value="Loan Type">Personal</option>
              <option value="Loan Type">Education</option>
            </select>
          </div>
          <br />
          <div class="Amount">
            <label for="Loan Amount">Loan Amount $:</label>
            <input type="Loan Amount" id="Loan Amount" required />
          </div>
          <br />
          <div class="Description">
            <label for="Description">Description</label>
            <textarea name="" id=""></textarea>
          </div>
          <br />
          <div class="submit">
            <label for="Submit">Submit Application</label>
            <input type="Button" value="Apply for loan." required />
          </div>
          <br />
          <div class="reset">
            <input type="reset" value="Clear" />
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
