<html>
  <head>
    <title>Form</title>
  </head>
  <body>
    <center>
      <b>
      <form action="">
        <h1>Registration Form</h1>
        <br />
        <label for="FirstName">First Name</label>
        <input type="text" id="FirstName" placeholder="Enter first name." />
        <br />
        <label for="LastName">Last Name</label>
        <input type="text" id="LastName" placeholder="Enter last name." />
        <br />
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" />
        <br />
        <label for="faculty">Select your faculty</label>
        <select id="faculty">
          <option disabled selected>Select your faculty</option>
          <option value="BSCCSIT">BSCCSIT</option>
          <option value="BCA">BCA</option>
        </select>
        <br />
        <h3>Select your gender</h3>
        <input type="radio" id="male" name="gender" />
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" />
        <label for="female">Female</label>
        <input type="radio" id="others" name="gender" />
        <label for="others">Others</label>
        <br />
        <label for="Phone">Phone Number</label>
        <input type="number" id="Phone" placeholder="Enter phone number" />
        <br />
        <label for="Email">Email</label>
        <input type="email" id="Email" placeholder="Enter email id" />
        <br />
        <label for="Address">Address</label>
        <input type="text" id="Address" placeholder="Enter your address." />
        <br />
        <input type="checkbox" id="AcceptTerms" />
        <label for="AcceptTerms">Accept terms and conditions.</label>
        <br />
        <label for="Color">Favorite Color</label>
        <input type="color" id="Color" />
        <br />
        <button type="submit">Submit</button>
      </form>
    </b>
    </center>
  </body>
</html>
