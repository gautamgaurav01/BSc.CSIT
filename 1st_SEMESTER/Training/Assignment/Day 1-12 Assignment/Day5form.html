<!DOCTYPE html>
<html>
  <head>
    <title>Assignment 5</title>
  </head>
  <body>
      <center> <h1>Form</h1> </center>
      <form>
      <label for="">Upload a file:</label>
      <input type="file" multiple />
      <br />
      <label for="">Select a range</label>
      <input type="range" />
      <br />
      <label for="">Enter a positive number:</label>
      <input type="number" min="0" />
      <br />
      <label for="">Choose a month:</label>
      <input type="month" />
      <br />
      <label for="">Choose a date:</label>
      <input type="date" />
      <br />
      <label for="">Choose a time:</label>
      <input type="time" />
      <br />
      <label for="">Your comments:</label><br />
      <textarea></textarea>
      <br />
      <label for="progressBar">Progress:</label>
      <br />
      <progress value="50" max="100"></progress>
      <br />
      <button type="submit">Submit</button>

      <br />
    </form>
  </body>
</html>
