<!DOCTYPE html>
<html>
  <head>
    <title>Registration Form</title>
  </head>
  <body>
    <center>
      <form action="https://nepathyacollege.edu.np/">
        <marquee behavior="alternate" direction="right" scrollamount="30" ><h1>Registration Form</h1></marquee>
        <h3>Personal Information</h3>
        <label for=""><b>First Name:</b></label>
        <input type="text" placeholder="Enter first name" required />
        <label for=""><b>Last Name:</b></label>
        <input type="text" placeholder="Enter last name" required />
        <br />
        <h3>Gender</h3>
        <label for=""><b>Select your gender:</b></label
        ><br />
        <select id="gender">
          <option disabled selected>Select your gender</option>
          <option value="Male" required>Male</option>
          <option value="Female">Female</option>
          <option value="Others">Others</option>
        </select>
        <h2>Faculty</h2>
        <label for=""><b>Select your faculty:</b></label
        ><br />
        <select id="faculty">
          <option disabled selected>Select your faculty</option>
          <option value="BSCCSIT" required >BSCCSIT</option>
          <option value="BCA">BCA</option>
        </select>
        <br />
        <h1>NEB Information</h1>
        <label for=""><b>NEB GPA:</b></label>
        <input type="GPA"placeholder="GPA" required />
        <label for=""><b>NEB School Name:</b></label>
        <input type="text" placeholder="School Name" required />
        <br />
        <h2>SEE Information</h2>
        <label for=""><b>SEE GPA:</b></label>
        <input type="GPA"placeholder="GPA" required />
        <label for=""><b>SEE School Name:</b></label>
        <input type="text" placeholder="School Name" />
        <br />
        <h2>Contact Information</h2>
        <label for=""><b>Phone Number:</b></label>
        <input type="number" placeholder="Enter phone number" required />
        <label for="Email"><b>Email:</b></label>
        <input type="email" placeholder="Enter email" required />
        <br />
        <h2>Address Information</h2>
        <label for=""><b>Address:</b></label
        ><br />
        <label for="">District:</label>
        <input type="text" placeholder="District" required />
        <label for="">Municipality:</label>
        <input type="text" placeholder="Municipality" required />
        <label for="">Ward:</label>
        <input type="text" placeholder="Tole" required />
        <br />
        <label for="password"><b>Password:</b></label>
        <br />
        <input type="password" placeholder="Enter password" required />
        <br />
        <input type="checkbox" id="AcceptTerms" />
        <label for="AcceptTerms"  required>
          <b>Accept terms and conditions.</b></label>
        <br />
        <input type="reset" value="Clear">
        <input type="submit" value="SEND" />
      </form>
    </center>
  </body>
</html
