<!DOCTYPE html>
<html>
  <head>
    <title>Login Form</title>
    <style>
      h2 {
        text-align: center;
        margin-bottom: 20px;
        color: black;
      }
      .login {
        background: white;
        padding: 40px 20px;
        border: 0.5px solid black;
        width: 350px; 
        margin: 80px auto;
      }
      .name input, 
      .password input {
        width: 90%;
        max-width: 330px;
        padding: 10px;
        margin: 10px auto;
        border: 1px solid #ccc;
      }
      .forget {
        text-align: left;
        margin-bottom: 15px;
        margin-left: 10px;
        color: gray;
      }
      .submit button {
        width: 100%;
        max-width: 400px;
        padding: 10px;
        background-color: gray;
        color: #fff;
        border: none;
        cursor: pointer;
        margin: 20px auto;
      }
      .signup a {
        color: gray;
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login">
      <h2>Login</h2>
      <form action="../Day13.html/main.html">
        <div class="name">
          <input type="email" placeholder="Enter your email" required />
        </div>
        <div class="password">
          <input type="password" placeholder="Enter your password" required />
        </div>
        <div class="forget">
          <label for="forget">Forgot password?</label>
        </div>
        <div class="submit">
          <button type="submit">Login</button>
        </div>
        <div class="signup">
          Don't have an account? <a href="../Day13.html/signup.html" target="_blank">Signup</a>
        </div>
      </form>
    </div>
  </body>
</html>
