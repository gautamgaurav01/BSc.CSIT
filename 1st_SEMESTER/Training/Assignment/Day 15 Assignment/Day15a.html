<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flags</title>
    <style>
      .flag {
        display: flex;
        gap: 20px;
      }
      .denmark_red {
        display: flex;
        flex-direction: column;
        width: 150px;
        height: 120px;
        background-color: red;
      }
      .denmark_white1 {
        background-color: white;
        width: 150px;
        height: 10px;
        position: absolute;
        top: 60px;
      }
      .denmark_white2 {
        background-color: white;
        width: 10px;
        height: 120px;
        position: absolute;
        top: 9px;
        left: 50px;
      }
      .russia_white {
        background-color: white;
        width: 148px;
        height: 40px;
        border: 1px solid black;
      }
      .russia_blue {
        background-color: blue;
        width: 150px;
        height: 40px;
      }
      .russia_red {
        background-color: red;
        width: 150px;
        height: 40px;
      }
      .norway_red {
        background-color: red;
        width: 150px;
        height: 120px;
      }
      .norway_blue1 {
        background-color: blue;
        width: 150px;
        height: 10px;
        position: absolute;
        top: 60px;
      }
      .norway_blue2{
        background-color: blue;
        width: 10px;
        height: 120px;
        position: absolute;
        top: 9px;
        left: 415px;
      }
      .france{
       display:flex;
      flex-direction: row;
      }
      .france_blue {
        background-color: blue;
         width: 50px;
        height: 120px;
      }
      .france_white {
        background-color: white;
         width: 50px;
        height: 118px;
        border: 1px solid black;
      }
      .france_red {
        background-color: red;
         width: 50px;
        height: 120px;
      }
      .france p{
        margin-top: 135px;
        position: relative;
        right: 120px;
      }
      .spain_red {
        background-color: red;
        width: 150px;
        height: 35px;
      }
      .spain_yellow {
        background-color: yellow;
        width: 150px;
        height: 45px;
      }
    </style>
  </head>
  <body>
    <div class="flag">
      <div class="denmark">
        <div class="denmark_red"></div>
        <div class="denmark_white1"></div>
        <div class="denmark_white2"></div>
        <p>Denmark</p>
      </div>
      <div class="russia">
        <div class="russia_white"></div>
        <div class="russia_blue"></div>
        <div class="russia_red"></div>
        <p>Russia</p>
      </div>
      <div class="norway">
        <div class="norway_red"></div>
        <div class="norway_blue1"></div>
        <div class="norway_blue2"></div>
        <p>Norway</p>
      </div>
      <div class="france">
        <div class="france_blue"></div>
        <div class="france_white"></div>
        <div class="france_red"></div>
        <p>France</p>
      </div>
      <div class="spain">
        <div class="spain_red"></div>
        <div class="spain_yellow"></div>
        <div class="spain_red"></div>
        <p>Spain</p>
      </div>
    </div>
  </body>
</html>
