<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.1/css/all.min.css"
      integrity="sha512-5Hs3dF2AEPkpNAR7UiOHba+lRSJNeM2ECkwxUIxC1Q/FLycGTbNapWXB4tP889k5T5Ju8fs4b1P5z/iB4nMfSQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./Day18.css" />
  </head>
  <body>
    <div class="container">
      <p class="name1">pinterest</p>
      <div class="first_container">
        <div class="first_container1">
          <i class="fa-brands fa-pinterest"></i>
          <div class="first_container1a">
            <i class="fa-sharp fa-solid fa-palette"></i>
            <i class="fa-solid fa-film"></i>
          </div>
          <div class="first_container1b">
            <i class="fa-solid fa-moon"></i>
          </div>
        </div>
        <div class="first_container2">
          <div class="first_container2a">
            <div class="first_container2a_top">
              <div class="top">HTML</div>
              <div class="top">REACT</div>
              <div class="top">VUE</div>
              <div class="top">SVG</div>
            </div>
            <div class="first_container2a_middle">
              <p> < class="fa-brands fa-pinterest"></> </p>
            </div>
            <div class="first_container2a_down">
              <i class="fa-solid fa-circle-info"></i>
              <p>Accebility + Icons</p>
            </div>
          </div>
          <div class="first_container2b">
            <i class="fa-solid fa-rocket"> Start Using This Icon</i>
          </div>
        </div>
      </div>
      <p class="name2">Animate</p>
      <div class="second_container">
        <div class="second_container1">
          <div class="second">No Animation</div>
          <div class="second"><i class="fa-solid fa-heart"></i> Beat</div>
          <div class="second">
            <i class="fa-regular fa-heart"></i> Beat Fade
          </div>
          <div class="second"><i class="fa-solid fa-circle"></i> Bounce</div>
          <div class="second"><i class="fa-solid fa-sliders"></i> Fade</div>
        </div>
        <div class="second_container1">
          <div class="second">Flip</div>
          <div class="second"><i class="fa-solid fa-bell-slash"></i> Shake</div>
          <div class="second">
            <i class="fa-solid fa-rotate-right"></i> Spin
          </div>
          <div class="second">
            <i class="fa-solid fa-rotate-left"></i> Spin-Reverse
          </div>
          <div class="second">
            <i class="fa-solid fa-spinner"></i> Spin Pulse
          </div>
        </div>
      </div>
      <div class="third_container">
        <i class="fa-solid fa-circle-info"></i>
        <b>Heads up!</b>
        <p>This work may be protected as a trademark.</p>
      </div>
    </div>
  </body>
</html>
